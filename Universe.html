<!DOCTYPE html>
<html>

<head>
    <title>Advanced WebVR Interior Design</title>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #222;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-size: 24px;
            flex-direction: column;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #555;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s infinite linear;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #crosshair-fallback {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            margin: -5px 0 0 -5px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            z-index: 99;
            pointer-events: none;
            display: none;
        }
    </style>

    <script>
        // ---------------------------------------------------------
        // Procedural Texture Generator (Ensuring 100% single-file reliability)
        // ---------------------------------------------------------
        const TexGen = {
            wood: function () {
                const c = document.createElement('canvas'); c.width = 512; c.height = 512;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#C19A6B'; ctx.fillRect(0, 0, 512, 512);
                for (let i = 0; i < 150; i++) {
                    ctx.fillStyle = Math.random() > 0.5 ? '#805A32' : '#A07850';
                    ctx.fillRect(Math.random() * 512, 0, Math.random() * 3 + 1, 512);
                }
                return c.toDataURL();
            },
            marble: function () {
                const c = document.createElement('canvas'); c.width = 512; c.height = 512;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#E8E8E8'; ctx.fillRect(0, 0, 512, 512);
                ctx.strokeStyle = '#C0C0C0'; ctx.lineWidth = 1;
                for (let i = 0; i < 40; i++) {
                    ctx.beginPath();
                    let x = Math.random() * 512, y = Math.random() * 512;
                    ctx.moveTo(x, y);
                    for (let j = 0; j < 4; j++) { ctx.lineTo(x + Math.random() * 120 - 60, y + Math.random() * 120 - 60); }
                    ctx.stroke();
                }
                return c.toDataURL();
            },
            tiles: function () {
                const c = document.createElement('canvas'); c.width = 512; c.height = 512;
                const ctx = c.getContext('2d');
                ctx.fillStyle = '#DDDDDD'; ctx.fillRect(0, 0, 512, 512);
                ctx.strokeStyle = '#FFFFFF'; ctx.lineWidth = 6;
                for (let x = 0; x <= 512; x += 64) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 512); ctx.stroke(); }
                for (let y = 0; y <= 512; y += 64) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(512, y); ctx.stroke(); }
                return c.toDataURL();
            }
        };

        // Inject textures to A-Frame assets dynamically
        AFRAME.registerComponent('dynamic-tex', {
            init: function () {
                document.getElementById('tex-wood').setAttribute('src', TexGen.wood());
                document.getElementById('tex-marble').setAttribute('src', TexGen.marble());
                document.getElementById('tex-tiles').setAttribute('src', TexGen.tiles());
                setTimeout(() => {
                    const loader = document.getElementById('loading');
                    if (loader) loader.style.display = 'none';
                }, 500);
            }
        });

        // ---------------------------------------------------------
        // Ambient Generative Audio (Web Audio API)
        // ---------------------------------------------------------
        let audioCtx, isAudioPlaying = false, oscillators = [], gains = [];
        function toggleAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (isAudioPlaying) {
                gains.forEach(g => g.gain.setTargetAtTime(0, audioCtx.currentTime, 0.5));
                isAudioPlaying = false;
            } else {
                if (oscillators.length === 0) {
                    // Create an ambient drone (Amaj7 chord)
                    [220, 277.18, 329.63, 440].forEach((freq, idx) => {
                        let osc = audioCtx.createOscillator();
                        let masterGain = audioCtx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = freq;

                        let lfo = audioCtx.createOscillator();
                        lfo.type = 'sine'; lfo.frequency.value = 0.1 + (idx * 0.02);
                        let lfoGain = audioCtx.createGain(); lfoGain.gain.value = 5;
                        lfo.connect(lfoGain); lfoGain.connect(osc.frequency);
                        lfo.start();

                        masterGain.gain.value = 0;
                        osc.connect(masterGain);
                        masterGain.connect(audioCtx.destination);
                        osc.start();
                        oscillators.push(osc); gains.push(masterGain);
                    });
                }
                audioCtx.resume();
                gains.forEach(g => g.gain.setTargetAtTime(0.04, audioCtx.currentTime, 1.0));
                isAudioPlaying = true;
            }
        }

        // ---------------------------------------------------------
        // A-Frame Custom Components
        // ---------------------------------------------------------

        // Billboard: forces element to face the camera (for tooltips)
        AFRAME.registerComponent('billboard', {
            tick: function () {
                let camera = this.el.sceneEl.camera;
                if (camera) {
                    let camPos = new THREE.Vector3();
                    camera.getWorldPosition(camPos);
                    this.el.object3D.lookAt(camPos);
                }
            }
        });

        // Furniture Behavior: Handles interaction (Name tooltip, Coloring, Moving)
        // NOTE: In a production setup, replace primitive assemblies with GLTF files.
        // ex: <a-entity gltf-model="url(model.glb)" furniture-behavior></a-entity>
        AFRAME.registerComponent('furniture-behavior', {
            schema: {
                colorTarget: { type: 'string', default: '' },
                colors: { type: 'array', default: ['#ff0000', '#00ff00', '#0000ff'] },
                pos1: { type: 'vec3' },
                pos2: { type: 'vec3' }
            },
            init: function () {
                this.colorIndex = 0;
                this.currentPos = 1;

                // Create hover tooltip for Name
                let tooltip = document.createElement('a-entity');
                let name = this.el.dataset.name || 'Object';
                tooltip.setAttribute('text', `value: ${name}; align: center; width: 5; color: #FFF; outlineColor: #000; outlineWidth: 0.1;`);
                tooltip.setAttribute('position', '0 2.5 0');
                tooltip.setAttribute('visible', 'false');
                tooltip.setAttribute('billboard', '');
                this.el.appendChild(tooltip);

                // Interactions
                this.el.addEventListener('mouseenter', () => tooltip.setAttribute('visible', true));
                this.el.addEventListener('mouseleave', () => tooltip.setAttribute('visible', false));

                this.el.addEventListener('click', () => {
                    let tool = window.currentTool || 'COLOR';
                    if (tool === 'COLOR') {
                        this.colorIndex = (this.colorIndex + 1) % this.data.colors.length;
                        let c = this.data.colors[this.colorIndex];
                        let targets = this.data.colorTarget ? this.el.querySelectorAll(this.data.colorTarget) : [this.el];
                        targets.forEach(t => {
                            if (t.hasAttribute('color')) t.setAttribute('color', c);
                            else if (t.components.material) t.setAttribute('material', 'color', c);
                        });
                    } else if (tool === 'MOVE') {
                        this.currentPos = this.currentPos === 1 ? 2 : 1;
                        let tPos = this.currentPos === 1 ? this.data.pos1 : this.data.pos2;
                        this.el.setAttribute('animation__move', {
                            property: 'position',
                            to: `${tPos.x} ${tPos.y} ${tPos.z}`,
                            dur: 800,
                            easing: 'easeInOutCubic'
                        });
                    }
                });
            }
        });

        // UI Button behavior
        AFRAME.registerComponent('ui-button', {
            schema: {
                text: { type: 'string', default: 'Btn' },
                action: { type: 'string', default: '' },
                value: { type: 'string', default: '' },
                bg: { type: 'string', default: '#444' },
                bgHover: { type: 'string', default: '#666' }
            },
            init: function () {
                let el = this.el;
                el.setAttribute('geometry', 'primitive: plane; width: 1.2; height: 0.35');
                el.setAttribute('material', `color: ${this.data.bg}; shader: flat`);
                el.classList.add('clickable');

                let t = document.createElement('a-text');
                t.setAttribute('value', this.data.text);
                t.setAttribute('align', 'center');
                t.setAttribute('position', '0 0 0.02');
                t.setAttribute('width', '2.5');
                el.appendChild(t);

                el.addEventListener('mouseenter', () => el.setAttribute('material', 'color', this.data.bgHover));
                el.addEventListener('mouseleave', () => el.setAttribute('material', 'color', this.data.bg));
                el.addEventListener('click', () => {
                    el.sceneEl.emit('ui-action', { action: this.data.action, value: this.data.value });
                    el.setAttribute('scale', '0.9 0.9 0.9');
                    setTimeout(() => el.setAttribute('scale', '1 1 1'), 100);
                });
            }
        });

        // Main Orchestrator for Room Customizations
        AFRAME.registerComponent('main-logic', {
            init: function () {
                window.currentTool = 'COLOR';
                this.el.addEventListener('ui-action', (e) => {
                    let data = e.detail;
                    switch (data.action) {
                        case 'wall-color':
                            document.querySelectorAll('.wall-paint').forEach(w => w.setAttribute('color', data.value));
                            break;
                        case 'floor-tex':
                            document.getElementById('floor').setAttribute('material', `src: #${data.value}; repeat: 10 10; roughness: 0.8; metalness: 0.1`);
                            break;
                        case 'ceiling-color':
                            document.getElementById('ceiling').setAttribute('color', data.value);
                            break;
                        case 'tool':
                            window.currentTool = data.value;
                            document.getElementById('tool-label').setAttribute('value', `ACT: ${data.value}`);
                            break;
                        case 'toggle-lights':
                            let amb = document.getElementById('ambient-light');
                            let isOn = amb.getAttribute('intensity') > 0;
                            amb.setAttribute('intensity', isOn ? '0' : '0.4');
                            break;
                        case 'day-night':
                            let sun = document.getElementById('sun-light');
                            let sky = document.getElementById('sky');
                            let isDay = sky.getAttribute('color') === '#87CEEB';
                            if (isDay) {
                                sky.setAttribute('color', '#0B1D3A');
                                sun.setAttribute('intensity', '0.1');
                                sun.setAttribute('color', '#aaccff');
                            } else {
                                sky.setAttribute('color', '#87CEEB');
                                sun.setAttribute('intensity', '0.8');
                                sun.setAttribute('color', '#ffffff');
                            }
                            break;
                        case 'audio':
                            toggleAudio();
                            break;
                        case 'reset':
                            document.querySelectorAll('.wall-paint').forEach(w => w.setAttribute('color', '#F5F5DC'));
                            document.getElementById('floor').setAttribute('material', `src: #tex-wood; repeat: 10 10; roughness: 0.8; metalness: 0.1`);
                            document.getElementById('ceiling').setAttribute('color', '#FFFFFF');
                            window.currentTool = 'COLOR';
                            document.getElementById('tool-label').setAttribute('value', `ACT: COLOR`);
                            document.getElementById('sky').setAttribute('color', '#87CEEB');
                            document.getElementById('sun-light').setAttribute('intensity', '0.8');
                            document.getElementById('ambient-light').setAttribute('intensity', '0.4');
                            break;
                    }
                });
            }
        });
    </script>
</head>

<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Generating Procedural Textures & Environment...</div>
    </div>

    <!-- VR Scene Configuration -->
    <!-- Note: A-Frame renders WebXR properly for Quest/Vive out of the box. -->
    <a-scene dynamic-tex main-logic shadow="type: pcfsoft" renderer="colorManagement: true; antialias: true;">

        <a-assets id="assets">
            <img id="tex-wood" src="">
            <img id="tex-marble" src="">
            <img id="tex-tiles" src="">
        </a-assets>

        <!-- Lighting & Environment -->
        <a-sky id="sky" color="#87CEEB"></a-sky>
        <a-light id="ambient-light" type="ambient" color="#fff" intensity="0.4"></a-light>
        <a-light id="sun-light" type="directional" position="5 10 -5" target="#room-center" castShadow="true"
            intensity="0.8" color="#ffffff" shadow-camera-near="0.1" shadow-camera-far="30" shadow-camera-bottom="-10"
            shadow-camera-top="10" shadow-camera-left="-10" shadow-camera-right="10"></a-light>
        <a-entity id="room-center" position="0 0 0"></a-entity>

        <!-- Room Architecture -->
        <a-entity id="architecture">
            <!-- Floor -->
            <a-plane id="floor" class="wall clickable" rotation="-90 0 0" width="12" height="12"
                material="src: #tex-wood; repeat: 10 10; roughness: 0.8; metalness: 0.1"
                shadow="receive: true; cast: false"></a-plane>
            <!-- Ceiling -->
            <a-plane id="ceiling" class="wall" rotation="90 0 0" position="0 4 0" width="12" height="12" color="#ffffff"
                material="roughness: 1" shadow="receive: true; cast: false"></a-plane>
            <!-- Walls (using realistic paint base) -->
            <a-plane class="wall wall-paint" position="0 2 -6" width="12" height="4" color="#F5F5DC"
                material="roughness: 0.9" shadow="receive: true; cast: false"></a-plane>
            <a-plane class="wall wall-paint" position="0 2 6" rotation="0 180 0" width="12" height="4" color="#F5F5DC"
                material="roughness: 0.9" shadow="receive: true; cast: false"></a-plane>
            <a-plane class="wall wall-paint" position="6 2 0" rotation="0 -90 0" width="12" height="4" color="#F5F5DC"
                material="roughness: 0.9" shadow="receive: true; cast: false"></a-plane>
            <a-plane class="wall wall-paint" position="-6 2 0" rotation="0 90 0" width="12" height="4" color="#F5F5DC"
                material="roughness: 0.9" shadow="receive: true; cast: false"></a-plane>
        </a-entity>

        <!-- IN-WORLD UI PANEL -->
        <!-- Placed on the North Wall -->
        <a-entity id="ui-panel" position="0 2 -5.9">
            <a-plane width="7" height="3.5" color="#1a1a1a" opacity="0.9"
                material="shader: flat; transparent: true"></a-plane>
            <a-text value="INTERIOR DESIGN STUDIO PANEL" align="center" position="0 1.4 0.02" width="5"
                color="#FFD700"></a-text>

            <!-- Paint controls -->
            <a-text value="WALL PAINT:" align="right" position="-2 0.9 0.02" width="3" color="#BBB"></a-text>
            <a-entity ui-button="text: Ivory Base; action: wall-color; value: #F5F5DC"
                position="-0.7 0.9 0.02"></a-entity>
            <a-entity ui-button="text: Ocean Blue; action: wall-color; value: #204060"
                position="0.7 0.9 0.02"></a-entity>
            <a-entity ui-button="text: Warm Rust; action: wall-color; value: #8B4513"
                position="2.1 0.9 0.02"></a-entity>

            <!-- Floor Controls -->
            <a-text value="FLOOR TEX:" align="right" position="-2 0.4 0.02" width="3" color="#BBB"></a-text>
            <a-entity ui-button="text: Hardwood; action: floor-tex; value: tex-wood"
                position="-0.7 0.4 0.02"></a-entity>
            <a-entity ui-button="text: Marble; action: floor-tex; value: tex-marble" position="0.7 0.4 0.02"></a-entity>
            <a-entity ui-button="text: White Tiles; action: floor-tex; value: tex-tiles"
                position="2.1 0.4 0.02"></a-entity>

            <!-- Ceiling Controls -->
            <a-text value="CEILING:" align="right" position="-2 -0.1 0.02" width="3" color="#BBB"></a-text>
            <a-entity ui-button="text: Bright White; action: ceiling-color; value: #FFFFFF"
                position="-0.7 -0.1 0.02"></a-entity>
            <a-entity ui-button="text: Soft Gray; action: ceiling-color; value: #A9A9A9"
                position="0.7 -0.1 0.02"></a-entity>
            <a-entity ui-button="text: Dark Matte; action: ceiling-color; value: #2C2C2C"
                position="2.1 -0.1 0.02"></a-entity>

            <!-- Interaction Mode -->
            <a-text value="FURNITURE INTERACTION TOOL:" align="center" position="-1.5 -0.6 0.02" width="3"
                color="#FFD700"></a-text>
            <a-entity ui-button="text: [ COLORIZE OBJECT ]; action: tool; value: COLOR; bg: #285228; bgHover: #3A7A3A"
                position="0.3 -0.6 0.02"></a-entity>
            <a-entity ui-button="text: [ REPOSITION ]; action: tool; value: MOVE; bg: #522828; bgHover: #7A3A3A"
                position="1.7 -0.6 0.02"></a-entity>
            <a-text id="tool-label" value="ACT: COLOR" align="center" position="2.8 -0.6 0.02" color="#00FF00"
                width="3"></a-text>

            <!-- Environment Specs -->
            <a-text value="ENVIRONMENT CONFIG:" align="center" position="-1.5 -1.2 0.02" width="3"
                color="#FFF"></a-text>
            <a-entity ui-button="text: Switch Lights; action: toggle-lights;" position="0.3 -1.2 0.02"></a-entity>
            <a-entity ui-button="text: Day / Night; action: day-night;" position="1.7 -1.2 0.02"></a-entity>

            <!-- Extras / Utilities -->
            <a-entity ui-button="text: Ambient BGM; action: audio;" position="0.3 -1.65 0.02"></a-entity>
            <a-entity ui-button="text: RESET ROOM; action: reset; bg: #8B0000; bgHover: #CC0000"
                position="1.7 -1.65 0.02"></a-entity>
        </a-entity>


        <!-- FURNITURE ITEMS -->
        <!-- Note: We use composite solid geometric objects acting as "3D Models". 
             These effectively replace raw GLTF imports ensuring 100% stability and shadow consistency in browsers. -->

        <!-- 1. The Bed -->
        <a-entity id="f-bed" class="furniture clickable" data-name="King Size Bed" position="3 0 -2"
            furniture-behavior="colorTarget: .blanket; colors: #3b5998,#8b0000,#2f4f4f; pos1: 3 0 -2; pos2: 3 0 2">
            <a-box width="2" depth="3" height="0.4" position="0 0.2 0" color="#444" material="roughness: 0.8"
                shadow></a-box>
            <a-box width="1.9" depth="2.9" height="0.3" position="0 0.55 0" color="#fff" shadow></a-box>
            <a-box class="blanket" width="1.95" depth="1.8" height="0.32" position="0 0.56 0.5" color="#3b5998"
                material="roughness:0.9" shadow></a-box>
            <a-box width="0.7" depth="0.4" height="0.15" position="-0.4 0.75 -1.1" rotation="10 0 0" color="#eee"
                shadow></a-box>
            <a-box width="0.7" depth="0.4" height="0.15" position="0.4 0.75 -1.1" rotation="10 0 0" color="#eee"
                shadow></a-box>
        </a-entity>

        <!-- 2. The Sofa -->
        <a-entity id="f-sofa" class="furniture clickable" data-name="Modern Lounge Sofa" position="-3 0 0"
            rotation="0 90 0"
            furniture-behavior="colorTarget: .cushion; colors: #4d4d4d,#d2691e,#556b2f; pos1: -3 0 0; pos2: -3 0 -3">
            <a-box width="3" depth="1" height="0.4" position="0 0.2 0" color="#222" shadow></a-box>
            <a-box class="cushion" width="2.8" depth="0.9" height="0.3" position="0 0.5 0" color="#4d4d4d"
                shadow></a-box>
            <a-box class="cushion" width="3" depth="0.3" height="1" position="0 0.9 -0.35" color="#4d4d4d"
                shadow></a-box>
            <a-box width="0.3" depth="1" height="0.7" position="-1.35 0.7 0" color="#222" shadow></a-box>
            <a-box width="0.3" depth="1" height="0.7" position="1.35 0.7 0" color="#222" shadow></a-box>
        </a-entity>

        <!-- 3. The Table -->
        <a-entity id="f-table" class="furniture clickable" data-name="Round Wood Table" position="0 0 0"
            furniture-behavior="colorTarget: .tabletop; colors: #8b5a2b,#696969,#b8860b; pos1: 0 0 0; pos2: -1.5 0 -2">
            <a-cylinder class="tabletop" radius="1.2" height="0.05" position="0 0.8 0" color="#8b5a2b"
                material="roughness: 0.6" shadow></a-cylinder>
            <a-cylinder radius="0.1" height="0.8" position="0 0.4 0" color="#111" shadow></a-cylinder>
            <a-cylinder radius="0.5" height="0.05" position="0 0.025 0" color="#111" shadow></a-cylinder>
        </a-entity>

        <!-- 4. The Chair -->
        <a-entity id="f-chair" class="furniture clickable" data-name="Designer Chair" position="0 0 -1.8"
            furniture-behavior="colorTarget: .c-mat; colors: #cccccc,#ee9900,#4488ff; pos1: 0 0 -1.8; pos2: -1.5 0 -0.8">
            <a-box class="c-mat" width="0.6" depth="0.6" height="0.05" position="0 0.45 0" color="#cccccc"
                shadow></a-box>
            <a-cylinder radius="0.03" height="0.45" position="-0.25 0.225 -0.25" color="#222" shadow></a-cylinder>
            <a-cylinder radius="0.03" height="0.45" position="0.25 0.225 -0.25" color="#222" shadow></a-cylinder>
            <a-cylinder radius="0.03" height="0.45" position="-0.25 0.225 0.25" color="#222" shadow></a-cylinder>
            <a-cylinder radius="0.03" height="0.45" position="0.25 0.225 0.25" color="#222" shadow></a-cylinder>
            <a-box class="c-mat" width="0.6" depth="0.05" height="0.6" position="0 0.75 -0.275" color="#cccccc"
                shadow></a-box>
        </a-entity>

        <!-- 5. The Wardrobe -->
        <a-entity id="f-wardrobe" class="furniture clickable" data-name="Tall Wardrobe" position="-4 0 4"
            rotation="0 180 0"
            furniture-behavior="colorTarget: .w-body; colors: #3e2723,#1b5e20,#b71c1c; pos1: -4 0 4; pos2: 4 0 4">
            <a-box class="w-body" width="1.8" depth="0.8" height="2.8" position="0 1.4 0" color="#3e2723"
                shadow></a-box>
            <a-box width="0.02" depth="0.82" height="2.7" position="0 1.4 0" color="#111"></a-box>
            <a-sphere radius="0.04" position="-0.1 1.4 0.42" color="#fff" material="metalness:0.8"></a-sphere>
            <a-sphere radius="0.04" position="0.1 1.4 0.42" color="#fff" material="metalness:0.8"></a-sphere>
        </a-entity>

        <!-- 6. The Lamp -->
        <a-entity id="f-lamp" class="furniture clickable" data-name="Standing Floor Lamp" position="-5 0 -5"
            furniture-behavior="colorTarget: .l-shade; colors: #ffddaa,#ffffff,#ffaaaa; pos1: -5 0 -5; pos2: 5 0 -5">
            <a-cylinder radius="0.3" height="0.05" position="0 0.025 0" color="#222" shadow></a-cylinder>
            <a-cylinder radius="0.03" height="1.6" position="0 0.8 0" color="#222" shadow></a-cylinder>
            <a-cone class="l-shade" radius-bottom="0.4" radius-top="0.1" height="0.4" position="0 1.7 0" color="#ffddaa"
                material="emissive: #443311; emissiveIntensity: 0.5" shadow="cast: false"></a-cone>
            <a-light id="local-lamp" type="point" intensity="0.6" distance="6" position="0 1.6 0"
                color="#ffeecc"></a-light>
        </a-entity>


        <!-- PLAYER RIG (Handles VR, Desktop, First-Person controls) -->
        <a-entity id="player-rig" movement-controls="speed: 0.15" position="0 0 3">
            <a-entity id="camera" camera position="0 1.6 0" look-controls="pointerLockEnabled: false">
                <!-- Cursor for Desktop/Gaze -->
                <a-entity cursor="rayOrigin: entity" raycaster="objects: .clickable" position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                    material="color: #fff; shader: flat; opacity: 0.8"
                    animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1">
                </a-entity>
            </a-entity>
            <!-- Laser controls for VR Headsets with Controllers (Oculus, Vive, etc) -->
            <a-entity laser-controls="hand: left" raycaster="objects: .clickable"></a-entity>
            <a-entity laser-controls="hand: right" raycaster="objects: .clickable"></a-entity>
        </a-entity>

    </a-scene>
</body>
